<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Digitalizador</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: system-ui, sans-serif; background: #fff; color: #111; min-height: 100vh; }

.header { background: #000; padding: 18px 20px 14px; }
.brand { display: flex; align-items: center; gap: 10px; }
.bar { width: 4px; height: 26px; background: #EC0000; border-radius: 2px; }
.brand-text { font-size: 18px; font-weight: 900; letter-spacing: 3px; color: #fff; }
.sub { font-size: 11px; color: #6F7779; letter-spacing: 1px; margin-top: 4px; padding-left: 14px; }

.body { padding: 24px 16px 80px; }

.screen { display: none; }
.screen.active { display: block; }

/* Buttons */
.btn-cam {
  width: 100%; background: #EC0000; border: none; border-radius: 14px;
  padding: 32px 20px; display: flex; flex-direction: column; align-items: center;
  gap: 6px; cursor: pointer; margin-bottom: 14px; touch-action: manipulation;
  -webkit-appearance: none; appearance: none;
}
.btn-cam:active { opacity: 0.8; }
.btn-gal {
  width: 100%; background: #111; border: none; border-radius: 14px;
  padding: 22px 20px; display: flex; flex-direction: column; align-items: center;
  gap: 5px; cursor: pointer; margin-bottom: 24px; touch-action: manipulation;
  -webkit-appearance: none; appearance: none;
}
.btn-gal:active { opacity: 0.8; }
.btn-icon { font-size: 40px; line-height: 1; }
.btn-icon-sm { font-size: 28px; line-height: 1; }
.btn-label { font-size: 18px; font-weight: 900; color: #fff; letter-spacing: 1px; }
.btn-label-sm { font-size: 15px; font-weight: 700; color: #fff; }
.btn-hint { font-size: 11px; color: rgba(255,255,255,0.55); }

.run-btn {
  display: block; width: 100%; background: #EC0000; color: #fff;
  border: none; border-radius: 8px; padding: 16px; font-size: 15px;
  font-weight: 800; cursor: pointer; font-family: inherit;
  touch-action: manipulation; -webkit-appearance: none; appearance: none;
}
.run-btn:active { opacity: 0.85; }
.run-btn.gray { background: #6F7779; margin-top: 24px; }
.run-btn.green { background: #18B98C; margin-bottom: 16px; }

/* Queue */
.section { margin-bottom: 20px; }
.section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.section-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: #6F7779; text-transform: uppercase; }
.clear-btn {
  background: none; border: 1px solid #ddd; border-radius: 4px;
  padding: 4px 10px; font-size: 12px; color: #6F7779; cursor: pointer;
  font-family: inherit; touch-action: manipulation;
}
.thumb-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
.thumb-wrap { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
.thumb-wrap img { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; border: 2px solid #eee; display: block; }
.thumb-x {
  position: absolute; top: -6px; right: -6px;
  background: #EC0000; color: #fff; border: none; border-radius: 50%;
  width: 22px; height: 22px; font-size: 11px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  touch-action: manipulation; font-family: inherit;
}

.empty-hint { font-size: 14px; color: #6F7779; line-height: 1.7; text-align: center; padding: 0 8px; margin-top: 4px; }

/* Camera overlay */
#cam-overlay {
  display: none; position: fixed; inset: 0; background: #000; z-index: 200;
  flex-direction: column;
}
#cam-overlay.show { display: flex; }
#cam-video { flex: 1; width: 100%; object-fit: cover; max-height: calc(100vh - 110px); }
#cam-canvas { display: none; }
.cam-bar {
  background: rgba(0,0,0,0.9); padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between; min-height: 90px;
}
.cam-cancel {
  background: none; border: 1px solid rgba(255,255,255,0.35); color: #fff;
  border-radius: 6px; padding: 10px 14px; font-size: 14px; cursor: pointer;
  font-family: inherit; touch-action: manipulation;
}
.cam-snap {
  width: 70px; height: 70px; border-radius: 50%;
  background: #EC0000; border: 4px solid #fff; font-size: 26px;
  cursor: pointer; touch-action: manipulation; display: flex;
  align-items: center; justify-content: center;
}
.cam-snap:active { transform: scale(0.92); }

/* Progress */
.progress-card { background: #f5f5f5; border-radius: 12px; padding: 30px 20px; text-align: center; margin-bottom: 20px; }
.progress-emoji { font-size: 38px; margin-bottom: 10px; }
.progress-text { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 14px; }
.progress-bar { background: #e0e0e0; border-radius: 99px; height: 6px; overflow: hidden; }
.progress-fill { background: #EC0000; height: 100%; border-radius: 99px; transition: width .4s; width: 0%; }

/* Log */
.log-box { background: #0d0d0d; border-radius: 8px; padding: 10px 12px; max-height: 160px; overflow-y: auto; margin-bottom: 16px; }
.log-line { font-size: 11px; margin-bottom: 2px; font-family: monospace; }
.log-ts { color: #555; margin-right: 5px; }
.c-info { color: #aaa; }
.c-ok { color: #18B98C; }
.c-err { color: #ff5555; }
.c-warn { color: #FFCC33; }

/* Drive */
.drive-btn {
  display: block; background: #18B98C; color: #fff; padding: 14px 18px;
  border-radius: 8px; font-weight: 700; font-size: 14px; text-decoration: none;
  margin-bottom: 20px; text-align: center;
}

/* Tabs */
.tabs { display: flex; border-bottom: 1px solid #eee; margin-bottom: 16px; }
.tab {
  background: none; border: none; border-bottom: 3px solid transparent;
  padding: 10px 16px; font-size: 13px; cursor: pointer; color: #6F7779;
  font-family: inherit; touch-action: manipulation;
}
.tab.on { color: #EC0000; border-bottom-color: #EC0000; font-weight: 700; }
.tab-panel { display: none; }
.tab-panel.on { display: block; }

/* Results */
.theme-block { margin-bottom: 24px; }
.theme-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.pill { background: #000; color: #fff; font-size: 11px; font-weight: 700; letter-spacing: 1px; padding: 3px 10px; border-radius: 3px; }
.theme-count { font-size: 11px; color: #6F7779; }
.rcard { border: 1px solid #e8e8e8; border-radius: 8px; padding: 12px; margin-bottom: 10px; background: #fafafa; }
.rcard-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.rcard-thumb { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; border: 1px solid #ddd; flex-shrink: 0; }
.rcard-title { font-size: 12px; font-weight: 700; color: #EC0000; }
.rcard-body { font-size: 13px; color: #333; line-height: 1.65; white-space: pre-wrap; }
.uni-box { border: 1px solid #e8e8e8; border-radius: 8px; background: #fafafa; padding: 14px; max-height: 400px; overflow-y: auto; }
.uni-pre { font-size: 12px; line-height: 1.7; white-space: pre-wrap; font-family: monospace; color: #222; }
</style>
</head>
<body>

<div class="header">
  <div class="brand"><div class="bar"></div><span class="brand-text">DIGITALIZADOR</span></div>
  <div class="sub">OCR · Câmera · Google Drive</div>
</div>

<!-- Camera overlay -->
<div id="cam-overlay">
  <video id="cam-video" playsinline autoplay muted></video>
  <canvas id="cam-canvas"></canvas>
  <div class="cam-bar">
    <button class="cam-cancel" id="btn-cam-cancel">✕ Cancelar</button>
    <button class="cam-snap" id="btn-snap">📸</button>
    <div style="width:80px"></div>
  </div>
</div>

<div class="body">

  <!-- HOME -->
  <div id="scr-home" class="screen active">
    <button class="btn-cam" id="btn-open-cam">
      <span class="btn-icon">📷</span>
      <span class="btn-label">Tirar Foto</span>
      <span class="btn-hint">abre a câmera</span>
    </button>

    <button class="btn-gal" id="btn-open-gal">
      <span class="btn-icon-sm">🖼️</span>
      <span class="btn-label-sm">Selecionar da Galeria</span>
      <span class="btn-hint">múltiplas imagens</span>
    </button>
    <input type="file" id="gal-input" accept="image/*" multiple style="display:none">

    <div id="queue-wrap" style="display:none">
      <div class="section">
        <div class="section-head">
          <span class="section-label" id="queue-label">FILA · 0</span>
          <button class="clear-btn" id="btn-clear">Limpar</button>
        </div>
        <div class="thumb-row" id="thumb-row"></div>
        <button class="run-btn" id="btn-run">▶ Digitalizar</button>
      </div>
    </div>

    <p class="empty-hint" id="empty-hint">
      Tire fotos ou selecione da galeria — elas entram na fila para transcrição automática e salvamento no Google Drive.
    </p>
  </div>

  <!-- PROCESSING -->
  <div id="scr-proc" class="screen">
    <div class="progress-card">
      <div class="progress-emoji">⏳</div>
      <div class="progress-text" id="prog-text">Processando…</div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    </div>
    <div class="log-box" id="log-proc"></div>
  </div>

  <!-- DONE -->
  <div id="scr-done" class="screen">
    <div class="log-box" id="log-done"></div>
    <a id="drive-a" class="drive-btn" href="#" target="_blank" style="display:none">📂 Abrir no Google Drive →</a>
    <div class="tabs">
      <button class="tab on" data-tab="temas">Por Tema</button>
      <button class="tab" data-tab="unificado">Documento</button>
    </div>
    <div id="panel-temas" class="tab-panel on"></div>
    <div id="panel-unificado" class="tab-panel">
      <div class="uni-box"><pre class="uni-pre" id="uni-pre"></pre></div>
    </div>
    <button class="run-btn gray" id="btn-reset">＋ Nova digitalização</button>
  </div>

</div>

<script>
(function () {
  'use strict';

  // ── state
  var queue = [];
  var camStream = null;

  // ── element refs
  var scrHome  = document.getElementById('scr-home');
  var scrProc  = document.getElementById('scr-proc');
  var scrDone  = document.getElementById('scr-done');
  var camOverlay = document.getElementById('cam-overlay');
  var camVideo   = document.getElementById('cam-video');
  var camCanvas  = document.getElementById('cam-canvas');
  var galInput   = document.getElementById('gal-input');
  var thumbRow   = document.getElementById('thumb-row');
  var queueWrap  = document.getElementById('queue-wrap');
  var queueLabel = document.getElementById('queue-label');
  var emptyHint  = document.getElementById('empty-hint');
  var runBtn     = document.getElementById('btn-run');
  var progText   = document.getElementById('prog-text');
  var progFill   = document.getElementById('prog-fill');
  var logProc    = document.getElementById('log-proc');
  var logDone    = document.getElementById('log-done');
  var driveA     = document.getElementById('drive-a');
  var uniPre     = document.getElementById('uni-pre');

  // ── helpers
  function showOnly(el) {
    [scrHome, scrProc, scrDone].forEach(function(s){ s.className = 'screen'; });
    el.className = 'screen active';
  }

  function log(msg, type) {
    var box = scrProc.className.indexOf('active') >= 0 ? logProc : logDone;
    var d = document.createElement('div');
    d.className = 'log-line c-' + (type || 'info');
    var ts = new Date().toLocaleTimeString('pt-BR');
    d.innerHTML = '<span class="log-ts">' + ts + '</span>' + escHtml(msg);
    box.appendChild(d);
    box.scrollTop = box.scrollHeight;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderQueue() {
    if (queue.length === 0) {
      queueWrap.style.display = 'none';
      emptyHint.style.display = '';
      return;
    }
    queueWrap.style.display = '';
    emptyHint.style.display = 'none';
    queueLabel.textContent = 'FILA · ' + queue.length + ' foto(s)';
    runBtn.textContent = '▶ Digitalizar ' + queue.length + ' foto(s)';
    thumbRow.innerHTML = '';
    queue.forEach(function(item, i) {
      var wrap = document.createElement('div');
      wrap.className = 'thumb-wrap';
      var img = document.createElement('img');
      img.src = item.dataURL;
      img.alt = item.name;
      var x = document.createElement('button');
      x.className = 'thumb-x';
      x.textContent = '✕';
      x.addEventListener('click', function(){ queue.splice(i, 1); renderQueue(); });
      wrap.appendChild(img);
      wrap.appendChild(x);
      thumbRow.appendChild(wrap);
    });
  }

  function readFile(file) {
    return new Promise(function(res, rej) {
      var r = new FileReader();
      r.onload = function(){ res(r.result); };
      r.onerror = function(){ rej(new Error('Leitura falhou')); };
      r.readAsDataURL(file);
    });
  }

  // ── camera
  function openCamera() {
    navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } }, audio: false
    }).then(function(stream) {
      camStream = stream;
      camVideo.srcObject = stream;
      camVideo.play();
      camOverlay.className = 'show';
    }).catch(function(e) {
      alert('Câmera bloqueada: ' + e.message + '\n\nUse o botão Galeria para selecionar imagens.');
    });
  }

  function closeCamera() {
    if (camStream) { camStream.getTracks().forEach(function(t){ t.stop(); }); camStream = null; }
    camOverlay.className = '';
  }

  function snapPhoto() {
    camCanvas.width  = camVideo.videoWidth;
    camCanvas.height = camVideo.videoHeight;
    camCanvas.getContext('2d').drawImage(camVideo, 0, 0);
    var dataURL = camCanvas.toDataURL('image/jpeg', 0.92);
    queue.push({ dataURL: dataURL, name: 'foto_' + Date.now() + '.jpg' });
    closeCamera();
    renderQueue();
  }

  // ── gallery
  function openGallery() { galInput.click(); }

  galInput.addEventListener('change', function() {
    var files = Array.from(galInput.files).filter(function(f){ return f.type.startsWith('image/'); });
    Promise.all(files.map(function(f){
      return readFile(f).then(function(dataURL){ return { dataURL: dataURL, name: f.name }; });
    })).then(function(items){
      queue = queue.concat(items);
      renderQueue();
      galInput.value = '';
    });
  });

  // ── API
  function transcribe(dataURL) {
    var b64 = dataURL.split(',')[1];
    var mt  = dataURL.split(';')[0].split(':')[1] || 'image/jpeg';
    return fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'Você é um digitalizador profissional. Responda APENAS com JSON válido, sem markdown.',
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mt, data: b64 } },
            { type: 'text', text: 'Transcreva TODO o texto visível nesta imagem preservando parágrafos.\nSugira UM tema curto (2-4 palavras).\nResponda SOMENTE com este JSON: {"transcricao":"...","tema":"..."}' }
          ]
        }]
      })
    }).then(function(r){
      if (!r.ok) throw new Error('API ' + r.status);
      return r.json();
    }).then(function(data){
      var raw = (data.content || []).filter(function(b){ return b.type === 'text'; }).map(function(b){ return b.text; }).join('').replace(/```json|```/g,'').trim();
      try { return JSON.parse(raw); } catch(e) { return { transcricao: raw || '[sem texto]', tema: 'Geral' }; }
    });
  }

  function saveDrive(folderName, unified, themeKeys) {
    var prompt = 'Você tem acesso ao Google Drive via MCP. Faça:\n1. Crie uma pasta chamada "' + folderName + '"\n2. Crie subpastas para cada tema: ' + themeKeys.join(', ') + '\n3. Crie "DOCUMENTO_UNIFICADO.txt" na pasta principal com:\n\n' + unified + '\n\n4. Retorne o link da pasta.';
    return fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }],
        mcp_servers: [{ type: 'url', url: 'https://drivemcp.googleapis.com/mcp/v1', name: 'google-drive' }]
      })
    }).then(function(r){
      if (!r.ok) throw new Error('Drive ' + r.status);
      return r.json();
    }).then(function(data){
      var text = (data.content || []).filter(function(b){ return b.type === 'text'; }).map(function(b){ return b.text; }).join('\n');
      var m = text.match(/https:\/\/drive\.google\.com[^\s)"'\]]+/);
      return { text: text, link: m ? m[0] : null };
    });
  }

  // ── pipeline
  function runPipeline() {
    if (!queue.length) return;
    var snap = queue.slice();
    showOnly(scrProc);
    logProc.innerHTML = '';
    progFill.style.width = '0%';

    var processed = [];
    var folderName = 'Digitalização_' + new Date().toISOString().slice(0,10);

    function step(i) {
      if (i >= snap.length) { return finish(); }
      var item = snap[i];
      progText.textContent = 'Processando ' + (i+1) + ' de ' + snap.length + '…';
      progFill.style.width = Math.round((i / snap.length) * 100) + '%';
      log('📷 [' + (i+1) + '/' + snap.length + '] ' + item.name, 'info');
      transcribe(item.dataURL).then(function(parsed){
        processed.push({ dataURL: item.dataURL, name: item.name, transcricao: parsed.transcricao, tema: parsed.tema, ok: true });
        log('✅ ' + item.name + ' → ' + parsed.tema, 'ok');
        step(i + 1);
      }).catch(function(err){
        processed.push({ dataURL: item.dataURL, name: item.name, transcricao: '[Erro: ' + err.message + ']', tema: 'Erro', ok: false });
        log('❌ ' + item.name + ': ' + err.message, 'err');
        step(i + 1);
      });
    }

    function finish() {
      progFill.style.width = '100%';
      var themes = {};
      processed.forEach(function(p){ if (!themes[p.tema]) themes[p.tema] = []; themes[p.tema].push(p); });
      var unified = processed.map(function(p, i){ return '## ' + (i+1) + '. ' + p.name + '\nTema: ' + p.tema + '\n\n' + p.transcricao; }).join('\n\n---\n\n');

      log('☁️ Salvando no Google Drive…', 'info');
      saveDrive(folderName, unified, Object.keys(themes)).then(function(result){
        log(result.text.slice(0, 200), 'info');
        if (result.link) log('✅ Pasta criada!', 'ok');
        else log('⚠️ Sem link retornado.', 'warn');
        showDone(processed, themes, unified, result.link);
      }).catch(function(err){
        log('❌ Drive: ' + err.message, 'err');
        showDone(processed, themes, unified, null);
      });
    }

    step(0);
  }

  function showDone(processed, themes, unified, link) {
    logDone.innerHTML = logProc.innerHTML;
    if (link) { driveA.href = link; driveA.style.display = 'block'; }
    else { driveA.style.display = 'none'; }

    // render tema panel
    var panelTemas = document.getElementById('panel-temas');
    panelTemas.innerHTML = '';
    Object.entries(themes).forEach(function(entry){
      var tema = entry[0], items = entry[1];
      var block = document.createElement('div');
      block.className = 'theme-block';
      block.innerHTML = '<div class="theme-head"><span class="pill">' + escHtml(tema) + '</span><span class="theme-count">' + items.length + ' foto(s)</span></div>';
      items.forEach(function(it){
        var card = document.createElement('div');
        card.className = 'rcard';
        card.innerHTML = '<div class="rcard-top"><img class="rcard-thumb" src="' + it.dataURL + '" alt=""><span class="rcard-title">' + escHtml(it.name) + '</span></div><div class="rcard-body">' + escHtml(it.transcricao) + '</div>';
        block.appendChild(card);
      });
      panelTemas.appendChild(block);
    });

    uniPre.textContent = unified;
    showOnly(scrDone);
  }

  // ── event listeners (NO onclick inline)
  document.getElementById('btn-open-cam').addEventListener('click', openCamera);
  document.getElementById('btn-open-gal').addEventListener('click', openGallery);
  document.getElementById('btn-cam-cancel').addEventListener('click', closeCamera);
  document.getElementById('btn-snap').addEventListener('click', snapPhoto);
  document.getElementById('btn-clear').addEventListener('click', function(){ queue = []; renderQueue(); });
  document.getElementById('btn-run').addEventListener('click', runPipeline);
  document.getElementById('btn-reset').addEventListener('click', function(){
    queue = []; logProc.innerHTML = ''; logDone.innerHTML = '';
    driveA.style.display = 'none'; progFill.style.width = '0%';
    document.getElementById('panel-temas').innerHTML = '';
    uniPre.textContent = '';
    renderQueue();
    showOnly(scrHome);
  });

  document.querySelectorAll('.tab').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.tab').forEach(function(b){ b.className = 'tab'; });
      document.querySelectorAll('.tab-panel').forEach(function(p){ p.className = 'tab-panel'; });
      btn.className = 'tab on';
      document.getElementById('panel-' + btn.dataset.tab).className = 'tab-panel on';
    });
  });

  // init
  renderQueue();
})();
</script>
</body>
</html>
